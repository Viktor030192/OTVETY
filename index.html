<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тестирование Э/Д Аминьевское v2.9</title>
  <style>
    :root {
      --bg: #000;
      --text: #ccc;
      --border: #555;
      --btn-bg: #333;
      --btn-hover: #444;
      --correct: #0f0;
      --incorrect: #f55;
      --selected: #138808;
      --white: #fff;
    }
    body.light-mode {
      --bg: #fff;
      --text: #000;
      --border: #333;
      --btn-bg: #f5f5f5;
      --btn-hover: #e0e0e0;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow: auto;
    }
    h2, h3 {
      margin-bottom: 1rem;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      color: var(--text);
    }
    button, .key, .zero-btn, .power-btn {
      font-family: inherit;
      cursor: pointer;
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      background-color: var(--btn-bg);
      color: var(--text);
      transition: background 0.2s;
    }
    button:hover, .key:hover, .zero-btn:hover {
      background-color: var(--btn-hover);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .container {
      max-width: 100%;
      width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }
    .main-container {
      display: flex;
      align-items: flex-start;
      gap: 0;
      width: 704px;
      max-width: 100%;
    }
    .left-column {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 304px;
    }
    .cell1 {
      width: 304px;
      height: 300px;
      border: 1px solid var(--border);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #codeInput {
      width: 260px;
      height: 80px;
      font-size: clamp(40px, 8vw, 60px);
      text-align: center;
      border: none;
      background: transparent;
      font-family: monospace;
      outline: none;
      color: var(--text);
    }
    .cell2 {
      width: 304px;
      height: 300px;
      border: 1px solid var(--border);
      border-top: none;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .cell2 img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .cell3 {
      width: 400px;
      height: 602px;
      border: 1px solid var(--border);
      border-left: none;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .keyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }
    .key, .zero-btn, .power-btn {
      width: 80px;
      height: 80px;
      background-color: var(--btn-bg);
      border: 4px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 50px;
      color: var(--text);
      user-select: none;
    }
    .delete {
      font-size: 50px;
    }
    .bottom-row {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      gap: 50px;
    }
    #message {
      margin-top: 2rem;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--correct);
      text-align: center;
      display: none;
    }
    #modeCategoryContainer,
    #testInfo,
    #questionsContainer,
    #statsContainer {
      display: none;
      max-width: 704px;
      margin: 0 auto;
      padding: 1rem;
    }
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.5rem 0 1rem;
    }
    .modeBtn, .categoryBtn {
      padding: 0.5rem 0.8rem;
      font-size: clamp(0.9rem, 3vw, 1.1rem);
    }
    .modeBtn.selected, .categoryBtn.selected {
      background-color: var(--selected);
      color: var(--white);
    }
    #startBtn {
      padding: 0.7rem 1.2rem;
      font-size: 1.1rem;
      margin-top: 1rem;
    }
    #question {
      background-color: var(--bg);
      padding: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: clamp(1rem, 4vw, 1.4rem);
      word-wrap: break-word;
      margin-bottom: 1rem;
    }
    #progress {
      text-align: center;
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      margin-bottom: 1rem;
      color: var(--text);
    }
    #answers {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    #answers button {
      padding: 1rem;
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      text-align: left;
      background-color: var(--btn-bg);
      border: 1px solid var(--border);
      color: var(--text);
    }
    #timer {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: var(--correct);
      text-align: center;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .action-buttons button {
      padding: 0.75rem 1.25rem;
      font-size: 1.1rem;
    }
    #statsContainer {
      background-color: var(--bg);
      border: 2px solid #696969;
      padding: 1.5rem;
      border-radius: 0.5rem;
      max-width: 704px;
      margin: 0 auto;
    }
    #backBtn {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      font-size: 1.1rem;
    }
    .theme-toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 24px;
      cursor: pointer;
      z-index: 1000;
      color: var(--text);
    }
    .hard-time-input {
      margin: 1rem 0;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .hard-time-input input {
      width: 80px;
      padding: 8px;
      font-size: 1.1rem;
      text-align: center;
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    @media (max-width: 704px) {
      .main-container {
        transform: scale(0.7);
        transform-origin: top center;
        width: 704px;
      }
    }
  </style>
</head>

    // ==================== АКТИВАЦИЯ ====================
    const input = document.getElementById('codeInput');
    const activationArea = document.getElementById('activationArea');
    const keys = document.querySelectorAll('.key');
    const zeroBtn = document.querySelector('.zero-btn');
    const okBtn = document.querySelector('.ok');
    const message = document.getElementById('message');
    const mainContent = document.getElementById('mainContent');
    const powerBtn = document.querySelector('.power-btn');

    let enteredCode = '';
    let activated = false;
    let inputActive = false;
    let isBlackScreen = false;

    activationArea.addEventListener('click', () => {
      if (!activated && !isBlackScreen) {
        input.readOnly = false;
        input.focus();
        input.select();
        activated = true;
      }
    });

    input.addEventListener('keydown', (e) => e.preventDefault());

    keys.forEach(key => {
      if (key.classList.contains('delete')) {
        key.addEventListener('click', () => {
          if (inputActive && enteredCode.length > 0) {
            enteredCode = enteredCode.slice(0, -1);
            input.value = enteredCode.padEnd(4, '0');
          }
        });
      } else if (key === okBtn) {
        key.addEventListener('click', () => {
          if (inputActive && enteredCode.length === 4) {
            if (enteredCode === '7777' || enteredCode === '3112') {
              mainContent.style.display = 'none';
              document.getElementById('modeCategoryContainer').style.display = 'block';
              addToggleButton();
            } else {
              alert('Неверный пароль');
            }
          }
        });
      } else if (key === zeroBtn) {
        key.addEventListener('click', () => {
          if (inputActive && enteredCode.length < 4) {
            enteredCode += '0';
            input.value = enteredCode.padEnd(4, '0');
          }
        });
      } else {
        key.addEventListener('click', () => {
          if (inputActive && enteredCode.length < 4) {
            enteredCode += key.textContent;
            input.value = enteredCode.padEnd(4, '0');
          }
        });
      }
    });

    input.addEventListener('focus', () => { inputActive = true; });

    powerBtn.addEventListener('click', () => {
      if (!isBlackScreen) {
        document.body.style.backgroundColor = 'black';
        mainContent.style.display = 'none';
        isBlackScreen = true;
      }
    });

    document.addEventListener('click', (e) => {
      if (isBlackScreen && !e.target.closest('.power-btn')) {
        document.body.style.backgroundColor = 'var(--bg)';
        mainContent.style.display = 'flex';
        isBlackScreen = false;
      }
    });

      };
      document.body.appendChild(toggle);
    }

    // ==================== ЛОГИКА ТЕСТА ====================
    const modeButtons = document.querySelectorAll('.modeBtn');
    const categoryButtons = document.querySelectorAll('.categoryBtn');
    const startBtn = document.getElementById('startBtn');
    const hardTimeContainer = document.getElementById('hardTimeContainer');
    const hardTimeInput = document.getElementById('hardTimeInput');

    const questionDiv = document.getElementById('question');
    const answersDiv = document.getElementById('answers');
    const nextBtn = document.getElementById('nextBtn');
    const finishBtn = document.getElementById('finishBtn');
    const endInfiniteBtn = document.getElementById('endInfiniteBtn');
    const questionsContainer = document.getElementById('questionsContainer');
    const statsContainer = document.getElementById('statsContainer');
    const progressDiv = document.getElementById('progress');
    const timerDiv = document.getElementById('timer');

    let selectedMode = "";
    let selectedCategory = "";
    let questions = [];
    let currentQuestionIndex = 0;
    let correctCount = 0;
    let totalQuestions = 0;
    let answeredCount = 0;           // ← Новое: для БЕСКОНЕЧНО
    let totalTimeSeconds = 0;
    let timerInterval = null;
    let questionTimerInterval = null;
    let currentAnswerCorrectIndex = 0;
    let hardTimePerQuestion = 0;

    modeButtons.forEach(btn => {
      btn.onclick = () => {
        modeButtons.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedMode = btn.dataset.mode;
        hardTimeContainer.style.display = (selectedMode === "HARD") ? 'flex' : 'none';
        checkReady();
      };
    });

    categoryButtons.forEach(btn => {
      btn.onclick = () => {
        categoryButtons.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedCategory = btn.dataset.category;
        checkReady();
      };
    });

    function checkReady() {
      startBtn.disabled = !(selectedMode && selectedCategory);
    }

    hardTimeInput.addEventListener('input', () => {
      let val = parseInt(hardTimeInput.value);
      if (isNaN(val) || val < 1) val = 1;
      if (val > 60) val = 60;
      hardTimeInput.value = val;
      hardTimePerQuestion = val;
    });

    startBtn.onclick = () => {
      if (selectedMode === "HARD") {
        hardTimePerQuestion = parseInt(hardTimeInput.value) || 0;
      }
      startTest();
    };

    function startTest() {
      document.getElementById('modeCategoryContainer').style.display = 'none';

      if (selectedCategory === "ВСЁ") {
        questions = Object.values(questionsData).flat();
      } else {
        questions = questionsData[selectedCategory] || [];
      }

      shuffleArray(questions);

      if (selectedMode === "СТАНДАРТ" || selectedMode === "HARD") {
        questions = questions.slice(0, 20);
      }

      currentQuestionIndex = 0;
      correctCount = 0;
      answeredCount = 0;
      totalQuestions = questions.length;

      questionsContainer.style.display = 'block';
      showQuestion();

      if (selectedMode === "СТАНДАРТ") {
        totalTimeSeconds = 20 * 60;
        startGlobalTimer();
      } else if (selectedMode === "HARD") {
        startQuestionTimer();
      } else if (selectedMode === "БЕСКОНЕЧНО") {
        endInfiniteBtn.style.display = 'inline-block';
      }
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function startGlobalTimer() {
      clearInterval(timerInterval);
      updateGlobalTimer();
      timerInterval = setInterval(() => {
        totalTimeSeconds--;
        if (totalTimeSeconds <= 0) {
          clearInterval(timerInterval);
          showResults();
        } else {
          updateGlobalTimer();
        }
      }, 1000);
    }

    function updateGlobalTimer() {
      const m = Math.floor(totalTimeSeconds / 60);
      const s = totalTimeSeconds % 60;
      timerDiv.innerText = `Осталось: ${m} мин ${s} сек`;
    }

    function startQuestionTimer() {
      clearInterval(questionTimerInterval);
      let sec = hardTimePerQuestion;
      updateQuestionTimer(sec);

      questionTimerInterval = setInterval(() => {
        sec--;
        if (sec <= 0) {
          clearInterval(questionTimerInterval);
          selectAnswer(-1, currentAnswerCorrectIndex); // пропуск
        } else {
          updateQuestionTimer(sec);
        }
      }, 1000);
    }

    function updateQuestionTimer(sec) {
      timerDiv.innerText = `Ответ за: ${sec} сек`;
    }

    function showQuestion() {
      if (currentQuestionIndex >= questions.length) {
        showResults();
        return;
      }

      const q = questions[currentQuestionIndex];
      const answersShuffled = [...q.answers];
      shuffleArray(answersShuffled);
      const correctAnswerText = q.answers[q.correct];
      currentAnswerCorrectIndex = answersShuffled.indexOf(correctAnswerText);

      questionDiv.innerText = q.q;
      progressDiv.innerText = `Вопрос ${currentQuestionIndex + 1} из ${totalQuestions}`;
      answersDiv.innerHTML = "";

      answersShuffled.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.innerText = ans;
        btn.onclick = () => selectAnswer(i, currentAnswerCorrectIndex);
        answersDiv.appendChild(btn);
      });

      if (selectedMode === "HARD") {
        startQuestionTimer();
      } else {
        clearInterval(questionTimerInterval);
      }
      nextBtn.style.display = 'none';
    }

    function selectAnswer(i, correctIdx) {
      clearInterval(questionTimerInterval);
      answeredCount++;                     // ← Увеличиваем счётчик отвеченных

      Array.from(answersDiv.children).forEach((b, idx) => {
        b.disabled = true;
        if (idx === correctIdx) b.style.backgroundColor = '#006400';
      });

      if (i >= 0) {
        if (i === correctIdx) {
          correctCount++;
          answersDiv.children[i].style.backgroundColor = '#006400';
        } else {
          answersDiv.children[i].style.backgroundColor = '#640000';
        }
      }

      if (selectedMode === "HARD") {
        setTimeout(() => {
          currentQuestionIndex++;
          showQuestion();
        }, 800);
      } else {
        nextBtn.style.display = 'inline-block';
      }
    }

    nextBtn.onclick = () => {
      currentQuestionIndex++;
      showQuestion();
    };

    finishBtn.onclick = showResults;
    endInfiniteBtn.onclick = showResults;

    function showResults() {
      clearInterval(timerInterval);
      clearInterval(questionTimerInterval);
      questionsContainer.style.display = 'none';

      const displayTotal = (selectedMode === "БЕСКОНЕЧНО") ? answeredCount : totalQuestions;
      const percent = displayTotal > 0 ? ((correctCount / displayTotal) * 100).toFixed(1) + '%' : '0%';

      statsContainer.innerHTML = `
        <h2>Результаты теста</h2>
        <p>Правильных ответов: ${correctCount} из ${displayTotal}</p>
        <p>Процент: ${percent}</p>
        <button id="backBtn">Назад в меню</button>
      `;
      statsContainer.style.display = 'block';

      document.getElementById('backBtn').onclick = () => {
        statsContainer.style.display = 'none';
        document.getElementById('modeCategoryContainer').style.display = 'block';
        modeButtons.forEach(b => b.classList.remove('selected'));
        categoryButtons.forEach(b => b.classList.remove('selected'));
        endInfiniteBtn.style.display = 'none';
      };
    }
  </script>
